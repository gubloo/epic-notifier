name: Epic Free Games Notifier

on:
  schedule:
    - cron: "0 1 * * *" # 1:00 AM UTC (6 PM Mountain Time)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore notifier state
        uses: actions/cache@v4
        with:
          path: last_games.json
          key: epic-free-games-state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python epic_free_games_notifier.py
